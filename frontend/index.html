    <style>
        .sidebar-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            color: #8888aa;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 150ms ease;
            border-left: 3px solid transparent;
            text-decoration: none;
        }
        .sidebar-nav-link:hover {
            background: rgba(0, 240, 255, 0.03);
            color: #e8e8f0;
        }
        .sidebar-nav-link.active {
            background: rgba(0, 240, 255, 0.05);
            color: #00f0ff;
            border-left-color: #00f0ff;
        }
        .sidebar-nav-link svg {
            flex-shrink: 0;
        }
        .sidebar-nav-section {
            margin-bottom: 1.5rem;
        }
        .sidebar-nav-section-title {
            padding: 0 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #555577;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
        }
        .sidebar .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }
        .sidebar .sidebar-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #1e1e4a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00f0ff, #ff00e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-logo-sub {
            font-size: 0.6rem;
            color: #555577;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e1e4a;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f0ff, #b44aff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            color: #0a0a1a;
            flex-shrink: 0;
        }
        .avatar-sm { width: 30px; height: 30px; font-size: 0.65rem; }
        .sidebar-user-info { flex: 1; min-width: 0; }
        .sidebar-user-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e8e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-user-role {
            font-size: 0.7rem;
            color: #555577;
            text-transform: capitalize;
        }
        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #1e1e4a;
        }
        .sidebar-logout {
            background: none;
            border: none;
            color: #555577;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 150ms ease;
        }
        .sidebar-logout:hover {
            color: #ff0044;
            background: rgba(255, 0, 68, 0.1);
        }
        .topbar-branch {
            padding: 4px 12px;
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .topbar-username {
            font-size: 0.85rem;
            color: #8888aa;
        }
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast-success { background-color: #10b981 !important; }
        .toast-error { background-color: #ef4444 !important; }
        .toast-warning { background-color: #f59e0b !important; }
        .toast-info { background-color: #3b82f6 !important; }
        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .pin-key:hover {
            background: #1f2937 !important;
        }
        .stat-card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateY(-2px);
        }
        .branch-tab.active {
            background: #12122e;
            color: #00f0ff;
        }
        @media (max-width: 1200px) {
        }
        @media (max-width: 800px) {
        }
    </style>
</head>

    <script src="/js/pages/admin-inventory.js?v=10"></script>
